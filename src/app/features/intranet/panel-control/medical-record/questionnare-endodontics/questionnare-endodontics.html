<div class="endodontics-container" [formGroup]="form">

  <div class="doctor-selector">
    <span>Doctor: </span>
    <mat-form-field appearance="outline">
      <mat-label>Seleccione un doctor</mat-label>
      <mat-select formControlName="doctor">
        <mat-option *ngFor="let doctor of doctors" [value]="doctor.id">
          {{ doctor.name }}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="hasError('doctor', 'required')">
        Debe seleccionar un doctor
      </mat-error>
    </mat-form-field>
  </div>

  <mat-accordion multi="true">

    <mat-expansion-panel>
      <mat-expansion-panel-header>
        <mat-panel-title>Sección</mat-panel-title>
      </mat-expansion-panel-header>
      <div class="panel-content">
      </div>
    </mat-expansion-panel>

    <mat-expansion-panel>
      <mat-expansion-panel-header>
        <mat-panel-title>EXAMEN CLÍNICO</mat-panel-title>
      </mat-expansion-panel-header>
      <div class="panel-content">
      </div>
    </mat-expansion-panel>

    <mat-expansion-panel>
      <mat-expansion-panel-header>
        <mat-panel-title>PRUEBA DE VITALIDAD</mat-panel-title>
      </mat-expansion-panel-header>
      <div class="panel-content">
      </div>
    </mat-expansion-panel>

    <mat-expansion-panel>
      <mat-expansion-panel-header>
        <mat-panel-title>EXAMEN RADIOGRÁFICO</mat-panel-title>
      </mat-expansion-panel-header>
      <div class="panel-content">
      </div>
    </mat-expansion-panel>

    <mat-expansion-panel>
      <mat-expansion-panel-header>
        <mat-panel-title>DIAGNÓSTICO PULPAR DE PRESUNCIÓN</mat-panel-title>
      </mat-expansion-panel-header>
      <div class="panel-content">
      </div>
    </mat-expansion-panel>

    <mat-expansion-panel>
      <mat-expansion-panel-header>
        <mat-panel-title>DIAGNÓSTICO PERIAPICAL</mat-panel-title>
      </mat-expansion-panel-header>
      <div class="panel-content">
      </div>
    </mat-expansion-panel>

    <mat-expansion-panel>
      <mat-expansion-panel-header>
        <mat-panel-title>DIAGNÓSTICO DEFINITIVO</mat-panel-title>
      </mat-expansion-panel-header>
      <div class="panel-content">
      </div>
    </mat-expansion-panel>

    <mat-expansion-panel>
      <mat-expansion-panel-header>
        <mat-panel-title>TRATAMIENTO INDICADO</mat-panel-title>
      </mat-expansion-panel-header>
      <div class="panel-content">
      </div>
    </mat-expansion-panel>

    <mat-expansion-panel>
      <mat-expansion-panel-header>
        <mat-panel-title>DATOS CLÍNICOS</mat-panel-title>
      </mat-expansion-panel-header>
      <div class="panel-content">
      </div>
    </mat-expansion-panel>

  </mat-accordion>

  <div class="actions-footer">
    <button mat-raised-button class="btn-save" (click)="save()">Guardar</button>
  </div>
</div>
